<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WindrosePlus — Sea Chart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: #142341; }
        #map { width: 100%; height: 100%; background: #142341; }
        .leaflet-container { background: #142341 !important; }
        .leaflet-tile-pane { background: #142341; }
        .player-marker {
            width: 14px; height: 14px; border-radius: 50%;
            background: #fff; border: 2px solid #c9a959;
            box-shadow: 0 0 8px rgba(201,169,89,0.6);
        }
        .player-label {
            white-space: nowrap; font-size: 11px; font-weight: 600;
            color: #ede0cc; text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            font-family: 'IBM Plex Mono', monospace;
        }
        .mob-marker {
            width: 8px; height: 8px; border-radius: 50%;
            background: #cc5544; border: 1px solid #aa3322;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #c9a959; font-family: 'IBM Plex Mono', monospace; font-size: 14px;
            z-index: 1000;
        }
        /* Items catalog overlay */
        #wpitems-btn {
            position: absolute; top: 12px; right: 12px; z-index: 1100;
            background: rgba(20, 35, 65, 0.92); color: #c9a959;
            border: 1px solid rgba(201, 169, 89, 0.45);
            padding: 7px 14px; cursor: pointer; border-radius: 3px;
            font: 11px 'IBM Plex Mono', monospace; letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        #wpitems-btn:hover { background: rgba(201, 169, 89, 0.18); color: #ede0cc; }
        #wpitems-panel {
            position: absolute; top: 0; right: -380px; bottom: 0; width: 360px;
            background: rgba(15, 22, 42, 0.96);
            border-left: 1px solid rgba(201, 169, 89, 0.3);
            z-index: 1200; transition: right 0.18s ease;
            display: flex; flex-direction: column;
            font-family: 'IBM Plex Mono', monospace; color: #ede0cc;
        }
        #wpitems-panel.open { right: 0; }
        #wpitems-head {
            padding: 12px 14px; border-bottom: 1px solid rgba(201, 169, 89, 0.18);
            display: flex; align-items: center; gap: 8px;
        }
        #wpitems-head h3 {
            margin: 0; font-size: 12px; font-weight: 600;
            color: #c9a959; letter-spacing: 0.08em; text-transform: uppercase;
            flex: 1;
        }
        #wpitems-count { color: #8f775d; font-size: 10px; }
        #wpitems-close {
            background: transparent; border: 0; color: #c9a959;
            cursor: pointer; font: 16px monospace; padding: 0 4px;
        }
        #wpitems-search {
            margin: 8px 14px; padding: 7px 10px;
            background: rgba(8, 14, 28, 0.85);
            border: 1px solid rgba(201, 169, 89, 0.22);
            color: #ede0cc; font: 11px 'IBM Plex Mono', monospace;
            border-radius: 2px;
        }
        #wpitems-search:focus { outline: none; border-color: #c9a959; }
        #wpitems-list { flex: 1; overflow-y: auto; padding: 0 14px 14px; }
        #wpitems-loading, #wpitems-empty {
            color: #8f775d; font-size: 11px; padding: 18px 0; text-align: center;
        }
        .wpitem {
            display: flex; gap: 10px; padding: 7px 4px; cursor: pointer;
            border-bottom: 1px solid rgba(201, 169, 89, 0.06);
            align-items: center;
        }
        .wpitem:hover { background: rgba(201, 169, 89, 0.06); }
        .wpitem-icon {
            width: 32px; height: 32px; flex-shrink: 0;
            background: rgba(8, 14, 28, 0.7);
            border: 1px solid rgba(201, 169, 89, 0.15);
            border-radius: 2px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .wpitem-body { flex: 1; min-width: 0; }
        .wpitem-name {
            font-size: 11px; color: #ede0cc;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .wpitem-meta { font-size: 10px; color: #8f775d; margin-top: 2px; }
        .wpitem-rarity-Common      { color: #b8b8b8; }
        .wpitem-rarity-Uncommon    { color: #5dba6f; }
        .wpitem-rarity-Rare        { color: #5d99cf; }
        .wpitem-rarity-Epic        { color: #b478d6; }
        .wpitem-rarity-Legendary   { color: #d6a04a; }
        #wpitems-detail {
            position: absolute; top: 0; right: 0; bottom: 0; width: 100%;
            background: rgba(15, 22, 42, 0.98);
            padding: 14px;
            z-index: 1300;
            overflow-y: auto;
            font-family: 'IBM Plex Mono', monospace; color: #ede0cc;
            font-size: 11px;
            visibility: hidden; opacity: 0;
            transition: opacity 0.15s ease;
        }
        #wpitems-detail.open { visibility: visible; opacity: 1; }
        #wpitems-detail h3 { font-size: 13px; color: #c9a959; margin-bottom: 4px; }
        #wpitems-detail h4 { color: #c9a959; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="loading">Loading map data...</div>
    <button type="button" id="wpitems-btn" title="Browse all items in the catalog">Items</button>
    <div id="wpitems-panel">
        <div id="wpitems-head">
            <h3>Items <span id="wpitems-count"></span></h3>
            <button type="button" id="wpitems-close" aria-label="Close">×</button>
        </div>
        <input type="search" id="wpitems-search" placeholder="Search by name, id, category, rarity…" autocomplete="off">
        <div id="wpitems-list"><div id="wpitems-loading">Click Items to load catalog…</div></div>
        <div id="wpitems-detail"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
    <script>
        // Fetch map manifest then initialize
        (async function() {
            var loadEl = document.getElementById('loading');
            var manifest;

            var isPublicMap = window.location.pathname.replace(/\/+$/, '') === '/public-map';
            var publicToken = '';
            try {
                publicToken = new URLSearchParams(window.location.search).get('token') || '';
            } catch (e) {}
            if (isPublicMap) document.title = 'WindrosePlus — Public Sea Chart';

            function withPublicToken(url) {
                if (!isPublicMap || !publicToken) return url;
                return url + (url.indexOf('?') === -1 ? '?' : '&') + 'token=' + encodeURIComponent(publicToken);
            }

            // Fetch map manifest from HTTP server API
            try {
                var mapInfoUrl = isPublicMap ? '/api/public/mapinfo' : '/api/mapinfo';
                var res = await fetch(withPublicToken(mapInfoUrl));
                if (res.ok) manifest = await res.json();
            } catch (e) {}

            if (!manifest || manifest.error) {
                var msg = 'Map not ready yet. Join the server once — the map generates automatically on first player connection.';
                if (manifest && manifest.generation) {
                    if (manifest.generation.state === 'running') msg += ' Tile generation is currently running.';
                    else if (manifest.generation.state === 'error') msg += ' Tile generation failed: ' + (manifest.generation.error || 'unknown error');
                    else if (manifest.generation.state === 'complete') msg += ' Tile generation completed, but the map manifest is still missing.';
                }
                loadEl.textContent = msg;
                return;
            }

            loadEl.remove();

            var W = {
                minX: manifest.world_min_x,
                maxX: manifest.world_max_x,
                minY: manifest.world_min_y,
                maxY: manifest.world_max_y
            };
            var SIDE = Math.max(W.maxX - W.minX, W.maxY - W.minY);
            var maxZoom = manifest.max_zoom || 4;

            // Custom CRS: map game world coordinates to tile pixels
            var fx = 256 / SIDE, fy = 256 / SIDE;
            var GameCRS = L.Util.extend({}, L.CRS.Simple, {
                transformation: new L.Transformation(fx, -W.minX * fx, fy, -W.minY * fy)
            });

            // Island content bounds from manifest or fallback to percentage crop
            var IB;
            if (manifest.island_bounds) {
                var ib = manifest.island_bounds;
                IB = L.latLngBounds([ib.min_y, ib.min_x], [ib.max_y, ib.max_x]);
            } else {
                IB = L.latLngBounds(
                    [W.minY + SIDE * 0.02, W.minX + SIDE * 0.05],
                    [W.minY + SIDE * 0.85, W.minX + SIDE * 0.70]
                );
            }

            var map = L.map('map', {
                crs: GameCRS,
                minZoom: 0,
                maxZoom: maxZoom + 2,
                maxBounds: IB.pad(0.1),
                maxBoundsViscosity: 1.0,
                zoomSnap: 0.25,
                zoomDelta: 0.5,
                attributionControl: false
            });

            var tileBase = window.location.origin;
            var tilePath = isPublicMap ? '/public-map/tiles/{z}/{x}-{y}.png' : '/livemap/tiles/{z}/{x}-{y}.png';
            L.tileLayer(tileBase + withPublicToken(tilePath), {
                minZoom: 0,
                maxZoom: maxZoom + 2,
                maxNativeZoom: maxZoom,
                tileSize: 256,
                noWrap: true,
                bounds: L.latLngBounds([W.minY, W.minX], [W.maxY, W.maxX]),
                // Truly transparent 1×1 RGBA PNG. The previous literal here decoded to
                // rgba(255,0,0,127), which Leaflet stretched into every missing tile slot
                // — three big red squares appeared at the southern edge of the public
                // Sea Chart whenever those tiles were not generated. Auth dashboard
                // already fixed this in server/web/index.html; mirror the same PNG here.
                errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNgYGBgAAAABQABeqhXUAAAAABJRU5ErkJggg=='
            }).addTo(map);

            map.fitBounds(IB);

            // Player + mob layers
            var playerLayer = L.layerGroup().addTo(map);
            var mobLayer = L.layerGroup().addTo(map);

            function worldToLatLng(wx, wy) { return L.latLng(wy, wx); }

            function escHtml(s) {
                var d = document.createElement('div');
                d.appendChild(document.createTextNode(s));
                return d.innerHTML;
            }

            async function fetchEntities() {
                try {
                    var liveMapUrl = isPublicMap ? '/api/public/livemap' : '/api/livemap';
                    var res = await fetch(withPublicToken(liveMapUrl));
                    if (!res.ok) return;
                    var data = await res.json();

                    playerLayer.clearLayers();
                    if (data.players) {
                        data.players.forEach(function(p) {
                            if (p.x === undefined || p.y === undefined) return;
                            if (Math.abs(p.x) < 100 && Math.abs(p.y) < 100) return;
                            var icon = L.divIcon({
                                className: '',
                                html: '<div class="player-marker"></div><div class="player-label">' + escHtml(p.name || 'Player') + '</div>',
                                iconSize: [14, 14], iconAnchor: [7, 7]
                            });
                            L.marker(worldToLatLng(p.x, p.y), { icon: icon }).addTo(playerLayer);
                        });
                    }

                    mobLayer.clearLayers();
                    if (data.mobs) {
                        data.mobs.forEach(function(m) {
                            if (m.x === undefined || m.y === undefined) return;
                            if (Math.abs(m.x) < 100 && Math.abs(m.y) < 100) return;
                            var icon = L.divIcon({
                                className: '',
                                html: '<div class="mob-marker" title="' + escHtml(m.name || 'Mob') + '"></div>',
                                iconSize: [8, 8], iconAnchor: [4, 4]
                            });
                            L.marker(worldToLatLng(m.x, m.y), { icon: icon }).addTo(mobLayer);
                        });
                    }
                } catch (e) {}
            }

            fetchEntities();
            setInterval(fetchEntities, 5000);
        })();

        // Items catalog overlay — fed by /catalog/v1/ on this dashboard.
        // The catalog is generic Windrose game data (item names, rarities,
        // descriptions, icon images, drop sources). It is identical on
        // every server, ships in the WindrosePlus zip, and is served
        // without authentication so public Sea Chart viewers can browse it.
        (function() {
            var btn = document.getElementById('wpitems-btn');
            var panel = document.getElementById('wpitems-panel');
            var closeBtn = document.getElementById('wpitems-close');
            var listEl = document.getElementById('wpitems-list');
            var searchEl = document.getElementById('wpitems-search');
            var countEl = document.getElementById('wpitems-count');
            var detailEl = document.getElementById('wpitems-detail');
            var CATALOG = '/catalog/v1';
            var items = null;
            var loaded = false;

            function escAttr(s) {
                return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }
            function escHtml(s) {
                var d = document.createElement('div');
                d.appendChild(document.createTextNode(s == null ? '' : String(s)));
                return d.innerHTML;
            }
            function iconUrl(iconRef) {
                if (!iconRef) return '';
                var base = iconRef.split('/').pop();
                // Reject anything that isn't a plain asset basename so a future
                // catalog with hostile iconRef can't break out of url('...').
                if (!/^[A-Za-z0-9_]+$/.test(base)) return '';
                return CATALOG + '/icons/items/' + base + '.webp';
            }

            function render(list) {
                if (!list.length) { listEl.innerHTML = '<div id="wpitems-empty">No matches.</div>'; return; }
                var html = [];
                for (var i = 0; i < list.length; i++) {
                    var it = list[i];
                    var rarity = it.rarity || '';
                    var dropCount = (it.drops || []).length;
                    var iconBg = it.iconRef ? "background-image:url('" + iconUrl(it.iconRef) + "')" : '';
                    html.push('<div class="wpitem" data-id="' + escAttr(it.id) + '">'
                        + '<div class="wpitem-icon" style="' + iconBg + '"></div>'
                        + '<div class="wpitem-body">'
                        +   '<div class="wpitem-name">' + escHtml(it.name || it.id) + '</div>'
                        +   '<div class="wpitem-meta">'
                        +     '<span class="wpitem-rarity-' + escAttr(rarity) + '">' + escHtml(rarity || '—') + '</span>'
                        +     ' · stack ' + (it.stackSize || 1)
                        +     ' · ' + dropCount + ' drop' + (dropCount === 1 ? '' : 's')
                        +   '</div>'
                        + '</div></div>');
                }
                listEl.innerHTML = html.join('');
            }

            function applyFilter() {
                if (!items) return;
                var q = (searchEl.value || '').toLowerCase().trim();
                var filtered;
                if (!q) {
                    filtered = items;
                } else {
                    filtered = items.filter(function(it) {
                        if ((it.name || '').toLowerCase().indexOf(q) >= 0) return true;
                        if ((it.id || '').toLowerCase().indexOf(q) >= 0) return true;
                        if ((it.category || '').toLowerCase().indexOf(q) >= 0) return true;
                        if ((it.rarity || '').toLowerCase().indexOf(q) >= 0) return true;
                        return false;
                    });
                }
                countEl.textContent = '(' + filtered.length + (q ? '/' + items.length : '') + ')';
                render(filtered);
            }

            function showDetail(id) {
                var it = null;
                for (var i = 0; i < items.length; i++) { if (items[i].id === id) { it = items[i]; break; } }
                if (!it) return;
                var drops = it.drops || [];
                var iconUrl_ = it.iconRef ? iconUrl(it.iconRef) : '';
                var html = '<button type="button" id="wpitems-back" style="background:transparent;border:0;color:#c9a959;cursor:pointer;font:11px monospace;padding:0 0 8px">← back</button>';
                if (iconUrl_) {
                    html += '<div style="width:64px;height:64px;float:right;margin-left:8px;background:rgba(8,14,28,.7);border:1px solid rgba(201,169,89,.2);border-radius:2px;background-size:contain;background-repeat:no-repeat;background-position:center;background-image:url(\'' + iconUrl_ + '\')"></div>';
                }
                html += '<h3>' + escHtml(it.name || it.id) + '</h3>';
                html += '<p style="color:#8f775d;font-size:10px;word-break:break-all">' + escHtml(it.id) + '</p>';
                var rarity = it.rarity || '';
                html += '<p><span class="wpitem-rarity-' + escAttr(rarity) + '">' + escHtml(rarity || '—') + '</span> · stack ' + (it.stackSize || 1);
                if (it.category) html += ' · ' + escHtml(it.category);
                html += '</p>';
                if (it.description) {
                    html += '<p style="white-space:pre-wrap;clear:both">' + escHtml(it.description.replace(/\\r\\n/g, '\n')) + '</p>';
                }
                if (drops.length) {
                    html += '<h4 style="font-size:11px;margin-top:14px;margin-bottom:6px;clear:both">Drops from (' + drops.length + ')</h4>';
                    for (var j = 0; j < drops.length; j++) {
                        var d = drops[j];
                        var pct = d.chance ? (Math.round(d.chance * 1000) / 10) : 0;
                        var qmin = d.minQuantity == null ? 0 : d.minQuantity;
                        var qmax = d.maxQuantity == null ? 0 : d.maxQuantity;
                        var qty = (qmin === qmax) ? String(qmin) : qmin + '–' + qmax;
                        html += '<div style="font-size:10px;color:#bdaa92;padding:5px 0;border-bottom:1px solid rgba(201,169,89,.06)">'
                            + '<div style="color:#ede0cc">' + escHtml(d.npcName || d.npcId || '?') + '</div>'
                            + '<div style="color:#8f775d">' + escHtml(d.sourceTypeLabel || d.sourceType || '') + ' · ' + pct + '% · qty ' + qty + '</div>'
                            + '</div>';
                    }
                } else {
                    html += '<p style="clear:both;color:#8f775d">No drop sources recorded.</p>';
                }
                detailEl.innerHTML = html;
                detailEl.classList.add('open');
                var back = document.getElementById('wpitems-back');
                if (back) back.addEventListener('click', function() { detailEl.classList.remove('open'); });
            }

            btn.addEventListener('click', function() {
                panel.classList.add('open');
                if (loaded) return;
                loaded = true;
                listEl.innerHTML = '<div id="wpitems-loading">Loading catalog…</div>';
                fetch(CATALOG + '/items_full.json')
                    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                    .then(function(d) {
                        items = Object.keys(d).map(function(k) { return d[k]; }).sort(function(a, b) {
                            return (a.name || '').localeCompare(b.name || '');
                        });
                        applyFilter();
                    })
                    .catch(function(e) {
                        loaded = false;
                        listEl.innerHTML = '<div id="wpitems-empty">Catalog unavailable: ' + escHtml(e.message) + '</div>';
                    });
            });
            closeBtn.addEventListener('click', function() {
                panel.classList.remove('open');
                detailEl.classList.remove('open');
            });
            searchEl.addEventListener('input', applyFilter);
            listEl.addEventListener('click', function(e) {
                var t = e.target;
                while (t && t !== listEl && !t.classList.contains('wpitem')) t = t.parentNode;
                if (!t || !t.classList || !t.classList.contains('wpitem')) return;
                showDetail(t.getAttribute('data-id'));
            });
        })();
    </script>
</body>
</html>
