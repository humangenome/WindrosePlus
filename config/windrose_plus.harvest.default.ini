; ============================================================
; WindrosePlus Per-Resource Harvest Yield
; ============================================================
;
; Per-resource multipliers for harvested resources. Stacks on top of
; multipliers.harvest_yield from windrose_plus.json:
;
;     final_yield = harvest_yield * <per-resource value>
;
; Default 1.0 means "use harvest_yield only — no per-resource override."
; Set wood=5.0 + harvest_yield=1.0 → wood drops 5x, everything else stays.
; Set wood=5.0 + harvest_yield=2.0 → wood drops 10x, everything else 2x.
;
; Affects:
;   - LootTables/Foliage/*.json       — burnt trees, debris, mineral nodes
;   - LootTables/Crop/*.json          — coconut palm, ficus, lime tree, etc.
;   - LootTables/PickupResource/*.json — sulfur, salt, mushrooms, eggs
;   - ResourcesSpawners/*.json        — Amount.Min/Max per spawner entry
;   - ContextualSpawners destroy scores — segmented-tree destroys use
;     [Resources] Wood; copper-cave digs use CopperOre; iron-cavern
;     digs use Iron
;
; Resource family is detected by matching `Resource_<Name>_T<digit>` in
; the LootItem path (e.g. /R5BusinessRules/.../DA_DID_Resource_Wood_T01
; → "Wood"). Lookup is case-insensitive (Wood, wood, WOOD all match).
; Unknown families fall through to harvest_yield only.
;
; Family aliases — wood-class drops follow Wood by default:
;   Hardwood, Bark, SticksWood, Mahogany, EnchantedWood
; If you set `Wood = 5.0` and don't list these children, they all
; multiply by 5.0 too. Add an explicit line (`Bark = 1.0`) to opt out.
;
; Like the other type-specific INIs, save this file as
; windrose_plus.harvest.ini (drop the .default) in your server root to
; activate. Edits trigger a PAK rebuild on the next launch.
;
; ------------------------------------------------------------
; KNOWN LIMITATION — multiplier does not reach every drop
; ------------------------------------------------------------
;
; This file modifies the JSON loot tables that ship in
; pakchunk0-WindowsServer.pak. UE5 also ships cooked binary DataAssets
; (.uasset/.uexp inside pakchunk0-WindowsServer.utoc/.ucas IoStore) for
; segment trees, ore deposits and similar destructible resource nodes.
; Some of those binary assets bake the loot quantities into their own
; serialised data and ignore the JSON loot table at runtime — our
; _P.pak override of the JSON has no effect on them.
;
; What this means in practice:
;   * Debris piles, foliage drops, pickup resources, crop tables —
;     multiplier APPLIES (modifying the JSON loot table works).
;   * Segmented trees (chop a tree → log → wood), iron deposits,
;     similar resource nodes — multiplier may NOT APPLY because the
;     drop count comes from the cooked DataAsset, not the JSON.
;
; To override those drops we'd need to patch the IoStore container
; (.utoc/.ucas) directly. Open question; see BACKLOG.
; ============================================================

[Resources]
; Wood — primary drop from trees (segmented and small). Also scales the
;        aliased children (Hardwood, Bark, SticksWood, Mahogany,
;        EnchantedWood) unless you list them explicitly below.
Wood        = 1.0
; Plant fiber — grasses, agave, hemp, flax bushes
FiberPlant  = 1.0
; Stone outcrops
Stone       = 1.0
; Clay deposits
Clay        = 1.0
; Ash deposits
Ash         = 1.0
; Sulfur outcrops
Sulfur      = 1.0
; Copper ore — surface nodes + copper cave dig volumes
CopperOre   = 1.0
; Iron ore — iron cavern dig volumes
Iron        = 1.0
; Charcoal from coal nodes
Charcoal    = 1.0
; Animal-derived (feather, fat, leather, horns, tusks, bezoar)
; — uncommon in foliage tables, more usually creature drops which
;   are not affected by this file.
Feather     = 1.0
Fat         = 1.0
Leather     = 1.0
GoatHorn    = 1.0
Bezoar      = 1.0

; Wood-family aliases — uncomment + set explicitly to override the
; Wood multiplier for that specific drop.
;Hardwood     = 1.0
;Bark         = 1.0
;SticksWood   = 1.0
;Mahogany     = 1.0
;EnchantedWood = 1.0
