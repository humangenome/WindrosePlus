; ============================================================
; WindrosePlus Per-Scope / Per-Resource Loot Multipliers
; ============================================================
;
; Optional file. Adds path-scoped and per-resource multipliers to the
; loot pass on top of multipliers.loot from windrose_plus.json:
;
;     final_drop = loot * <scope value> * <per-resource value>
;
; Default 1.0 means "no override at this layer".
;
; Two sections:
;
;   [Scopes]      Path-scoped multiplier per loot-table directory.
;                 Stacks on multipliers.loot for files matching that
;                 scope. chest scopes LootTables/Chests/*.json.
;
;   [Resources]   Per-resource family multiplier. Stacks on the file's
;                 effective scope multiplier when a LootData entry
;                 references that family. Family is extracted from the
;                 entry's LootItem path via the same regex as
;                 windrose_plus.harvest.ini (Resource_<Name>_T<digit>).
;                 Use the same casing as the asset name (e.g.
;                 `TumbagoIngot`).
;
; Equipment drops are excluded from every multiplier in this file —
; multiplying weapons / armor produces dupe-stack glitches (issue #3).
;
; Combined example (everything stacks):
;
;     [Scopes]
;     chest = 2.0
;
;     [Resources]
;     TumbagoIngot = 5.0
;
;   With multipliers.loot = 1.0 in windrose_plus.json this gives:
;     - All non-Tumbago drops in chests       2x   (loot 1x * chest 2x)
;     - Tumbago ingots ANYWHERE outside chest 5x   (loot 1x * res 5x)
;     - Tumbago ingots inside a chest         10x  (loot 1x * 2x * 5x)
;
; Like other type-specific INIs, save this file as
; windrose_plus.loot.ini (drop the .default) in your server root to
; activate. Edits trigger a PAK rebuild on the next launch.
; ============================================================

[Scopes]
; LootTables/Chests/*.json — treasure / biome / personal / pickup chests
chest = 1.0

[Resources]
; Tumbago ingots — only loot source today is the Senkamati Pot pickup
; chest in the swamp biome (DA_LT_PickupChest_SW_Senkamati_Pot_Tumbaga).
; Asset key `Resource_TumbagoIngot_T03`, family `TumbagoIngot`.
TumbagoIngot = 1.0
